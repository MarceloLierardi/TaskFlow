<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskflow | Calendário</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="ph-bold ph-check-square-offset"></i>
                <h2>Taskflow</h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <i class="ph ph-list-checks"></i>
                    <span>Minhas Tarefas</span>
                </a>
                <a href="dashboard.html" class="nav-item">
                    <i class="ph ph-chart-pie-slice"></i>
                    <span>Dashboard</span>
                </a>
                <a href="calendar.html" class="nav-item active">
                    <i class="ph ph-calendar-blank"></i>
                    <span>Calendário</span>
                </a>
                <a href="profile.html" class="nav-item">
                    <i class="ph ph-user"></i>
                    <span>Perfil</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-avatar" id="sidebar-user-avatar">?</div>
                <div class="user-info-mini">
                    <span class="name" id="sidebar-user-name">Usuário</span>
                    <span class="role">Membro</span>
                </div>
            </div>
        </aside>

        <!-- Main Content (Calendar) -->
        <main class="main-content">
            <header class="calendar-header">
                <button class="calendar-nav-btn" id="prev-month">
                    <i class="ph-bold ph-caret-left"></i>
                </button>
                <h2 id="month-year-display">Mês Ano</h2>
                <button class="calendar-nav-btn" id="next-month">
                    <i class="ph-bold ph-caret-right"></i>
                </button>
            </header>

            <div class="calendar-grid" id="calendar-days-header">
                <div class="calendar-day-header">Dom</div>
                <div class="calendar-day-header">Seg</div>
                <div class="calendar-day-header">Ter</div>
                <div class="calendar-day-header">Qua</div>
                <div class="calendar-day-header">Qui</div>
                <div class="calendar-day-header">Sex</div>
                <div class="calendar-day-header">Sáb</div>
            </div>
            
            <div class="calendar-grid" id="calendar-grid-body">
                <!-- Days will be generated by JS -->
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await requireAuth();
            if (!user) return;
            
            // Sidebar User Info
            const userName = user.user_metadata?.name || user.email || 'Usuário';
            document.getElementById('sidebar-user-name').textContent = userName.split(' ')[0];
            document.getElementById('sidebar-user-avatar').textContent = userName.charAt(0).toUpperCase();

            // Calendar Logic
            let currentDate = new Date();
            const gridBody = document.getElementById('calendar-grid-body');
            const monthYearDisplay = document.getElementById('month-year-display');

            // Load tasks for this user
            const allTasks = JSON.parse(localStorage.getItem('taskflow_tasks')) || [];
            const tasks = allTasks.filter(t => t.userId === user.id && t.dueDate);

            function renderCalendar(date) {
                gridBody.innerHTML = '';
                
                const year = date.getFullYear();
                const month = date.getMonth();
                
                // Format Month Year
                const monthName = date.toLocaleString('pt-BR', { month: 'long' });
                monthYearDisplay.textContent = `${monthName.charAt(0).toUpperCase() + monthName.slice(1)} ${year}`;

                // Get first day of month and total days
                const firstDayIndex = new Date(year, month, 1).getDay(); // 0 is Sunday
                const lastDate = new Date(year, month + 1, 0).getDate();
                
                // Add empty cells for days before the 1st
                for (let i = 0; i < firstDayIndex; i++) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'calendar-cell empty';
                    gridBody.appendChild(emptyCell);
                }

                // Add cells for each day
                const today = new Date();
                const isCurrentMonth = today.getMonth() === month && today.getFullYear() === year;

                for (let day = 1; day <= lastDate; day++) {
                    const cell = document.createElement('div');
                    cell.className = 'calendar-cell';
                    if (isCurrentMonth && day === today.getDate()) {
                        cell.classList.add('today');
                    }

                    const dateSpan = document.createElement('span');
                    dateSpan.className = 'calendar-date';
                    dateSpan.textContent = day;
                    cell.appendChild(dateSpan);

                    // Find tasks for this day
                    const dayTasks = tasks.filter(t => {
                        const taskDate = new Date(t.dueDate);
                        return taskDate.getDate() === day && 
                               taskDate.getMonth() === month && 
                               taskDate.getFullYear() === year;
                    });

                    // Add task dots
                    dayTasks.forEach(t => {
                        const dot = document.createElement('div');
                        dot.className = 'calendar-task-dot';
                        if (t.completed) {
                            dot.classList.add('completed');
                        } else {
                            const dueTime = new Date(t.dueDate).getTime();
                            if (dueTime < new Date().getTime()) {
                                dot.classList.add('overdue');
                            }
                        }
                        
                        // Show time + text
                        const timeStr = new Date(t.dueDate).toLocaleString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                        dot.textContent = `${timeStr} - ${t.text}`;
                        cell.appendChild(dot);
                    });

                    gridBody.appendChild(cell);
                }
            }

            renderCalendar(currentDate);

            document.getElementById('prev-month').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar(currentDate);
            });

            document.getElementById('next-month').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar(currentDate);
            });
        });
    </script>
</body>
</html>
